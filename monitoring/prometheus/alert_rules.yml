groups:
  - name: cloudnotes-alerts
    rules:
      - alert: BackendDown
        expr: up{job="cloudnotes-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CloudNotes backend is DOWN"
          description: "The backend target has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(flask_http_request_total{status=~"5.."}[5m]))
            /
            sum(rate(flask_http_request_total[5m]))
          ) > 0.10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on CloudNotes backend"
          description: "More than 10% of requests are returning 5xx errors."

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, sum(rate(flask_http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High API latency detected"
          description: "95th percentile latency is above 1 second."

      - alert: NoNotesCreated
        expr: increase(notes_created_total[1h]) == 0 and notes_created_total > 0
        for: 1h
        labels:
          severity: info
        annotations:
          summary: "No notes created in the last hour"
          description: "User activity may have dropped; no new notes created."
