version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cloudnotes
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cloudnotes-network

  backend:
    build:
      context: ../app/backend
    environment:
      DATABASE_URL: postgresql://admin:secret123@db:5432/cloudnotes
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - cloudnotes-network

  frontend:
    build:
      context: ../app/frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cloudnotes-network

networks:
  cloudnotes-network:
    driver: bridge

volumes:
  pgdata:
