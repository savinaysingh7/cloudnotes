version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cloudnotes
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cloudnotes-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cloudnotes"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../app/backend
    environment:
      DATABASE_URL: postgresql://admin:secret123@db:5432/cloudnotes
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cloudnotes-network

  frontend:
    build:
      context: ../app/frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cloudnotes-network

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    networks:
      - cloudnotes-network

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - cloudnotes-network

networks:
  cloudnotes-network:
    driver: bridge

volumes:
  pgdata:
