<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CloudNotes — A containerized note-taking app with full DevOps pipeline. Create, read, update, and delete notes.">
    <title>CloudNotes by Savinay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Toast container -->
    <div id="toast-container"></div>

    <div class="app-wrapper">
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">☁️</span>
                <h1>CloudNotes</h1>
            </div>
            <p class="tagline">A containerized note-taking app with full DevOps pipeline</p>
        </header>

        <main class="app-main">
            <!-- Search bar -->
            <div class="search-bar">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search notes...">
            </div>

            <!-- Note form -->
            <div class="note-form" id="note-form">
                <input type="text" id="note-title" placeholder="Note title" maxlength="100">
                <textarea id="note-body" placeholder="Write your note..." rows="3"></textarea>
                <button id="add-note" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    Add Note
                </button>
            </div>

            <!-- Notes count -->
            <div class="notes-header">
                <span id="notes-count" class="notes-count">0 notes</span>
            </div>

            <!-- Loading spinner -->
            <div id="loading" class="loading" style="display:none;">
                <div class="spinner"></div>
            </div>

            <!-- Notes list -->
            <div id="notes-list" class="notes-list">
                <!-- Notes will be loaded here -->
            </div>
        </main>

        <footer class="app-footer">
            <p>CloudNotes v2.0 (Automated) &bull; Flask &bull; Docker &bull; Kubernetes &bull; Jenkins &bull; Prometheus</p>
        </footer>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h2>Edit Note</h2>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-note-id">
                <input type="text" id="edit-note-title" placeholder="Note title" maxlength="100">
                <textarea id="edit-note-body" placeholder="Write your note..." rows="4"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
