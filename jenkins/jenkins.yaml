jenkins:
  systemMessage: "CloudNotes Disposable DevOps: Code -> Test -> Scan -> Build -> Push -> Deploy"
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin"
  authorizationStrategy:
    globalMatrix:
      entries:
        - user:
            name: "admin"
            permissions:
              - "Overall/Administer"
        - group:
            name: "authenticated"
            permissions:
              - "Overall/Read"

unclassified:
  location:
    url: "http://REPLACE_ME_JENKINS_IP:8080/"

jobs:
  - script: >
      pipelineJob('CloudNotes-Pipeline') {
        description('Automated CloudNotes delivery pipeline: Code -> Test -> Scan -> Build -> Push -> Deploy.')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/savinaysingh7/cloudnotes.git')
                }
                branches('main')
              }
            }
          }
        }
      }

      listView('CloudNotes') {
        description('Focused dashboard for the disposable CloudNotes CI/CD demo.')
        jobs {
          name('CloudNotes-Pipeline')
        }
        columns {
          status()
          weather()
          name()
          lastSuccess()
          lastFailure()
          lastDuration()
          buildButton()
        }
      }
